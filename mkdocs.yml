site_name: AI Trend Reports
site_url: https://amszuidas.github.io/ai-trend-reports/
site_description: 每日 AI / Agent 开源项目与行业进展报告

repo_name: amszuidas/ai-trend-reports
repo_url: https://github.com/amszuidas/ai-trend-reports
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: zh
  logo: assets/brand-mark.svg
  favicon: assets/brand-mark.svg
  font: false
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.action.view
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: 切换至深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: 切换至浅色模式

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/amszuidas/ai-trend-reports
      name: 在 GitHub 上查看 AI Trend Reports

copyright: AI Trend Reports · 持续更新，交叉核验

plugins:
  - search:
      lang: zh
  - awesome-pages

markdown_extensions:
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
